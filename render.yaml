services:
  - type: web
    name: brillo
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brillo-db
          property: connectionString
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: BASE_URL
        sync: false

databases:
  - name: brillo-db
    plan: free
