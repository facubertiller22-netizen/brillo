<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 60" width="180" height="60">
  <defs>
    <clipPath id="oval">
      <ellipse cx="30" cy="30" rx="28" ry="18"/>
    </clipPath>
  </defs>
  <!-- Oval background -->
  <ellipse cx="30" cy="30" rx="28" ry="18" fill="#009EE3"/>
  <!-- White center stripe -->
  <rect x="2" y="23" width="56" height="14" fill="white" clip-path="url(#oval)"/>
  <!-- Light blue stripes -->
  <rect x="2" y="2" width="56" height="21" fill="#72C5ED" clip-path="url(#oval)"/>
  <rect x="2" y="37" width="56" height="21" fill="#72C5ED" clip-path="url(#oval)"/>
  <!-- Oval border -->
  <ellipse cx="30" cy="30" rx="28" ry="18" fill="none" stroke="#2D3092" stroke-width="2.5"/>
  <!-- Simplified hands silhouette -->
  <path d="M18 32 Q21 27 26 28 Q28 28 30 30 Q32 28 34 28 Q39 27 42 32" fill="none" stroke="#2D3092" stroke-width="2" stroke-linecap="round"/>
  <path d="M20 34 Q24 30 28 31 Q30 32 32 31 Q36 30 40 34" fill="none" stroke="#2D3092" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Text -->
  <text x="68" y="26" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#2D3092">mercado</text>
  <text x="68" y="43" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#2D3092">pago</text>
</svg>
